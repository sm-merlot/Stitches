name: Tests

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit and widget tests
    if: github.event_name == 'workflow_dispatch' || (github.event.issue.pull_request != null && contains(github.event.comment.body, '/ci') && github.event.comment.user.login == 'scme0')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - name: Checkout private test fixtures
        uses: actions/checkout@v4
        with:
          repository: scme0/stitches-test-fixtures
          token: ${{ secrets.FIXTURES_TOKEN }}
          path: test-fixtures
      - name: Write placeholder secrets
        run: cp secrets.json.example secrets.json
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Run unit and widget tests
        run: flutter test --reporter=expanded

  integration-tests:
    name: Integration tests (PK parser + roundtrip)
    if: github.event_name == 'workflow_dispatch' || (github.event.issue.pull_request != null && contains(github.event.comment.body, '/ci') && github.event.comment.user.login == 'scme0')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - name: Checkout private test fixtures
        uses: actions/checkout@v4
        with:
          repository: scme0/stitches-test-fixtures
          token: ${{ secrets.FIXTURES_TOKEN }}
          path: test-fixtures
      - name: Write placeholder secrets
        run: cp secrets.json.example secrets.json
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            xvfb
      - run: flutter pub get
      - name: Enable Linux desktop and scaffold platform
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux .
      - name: PK parser — real-world PDFs
        run: xvfb-run flutter test integration_test/pk_real_pdf_parse_test.dart -d linux --no-pub --reporter=expanded
      - name: PK PDF roundtrip
        run: xvfb-run flutter test integration_test/pk_roundtrip_test.dart -d linux --no-pub --reporter=expanded
