name: Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: "3.41.4"
  FLUTTER_HOME: /home/runner/flutter

jobs:
  unit-tests:
    name: Unit and widget tests
    runs-on: homelab
    steps:
      - uses: actions/checkout@v4
      - name: Checkout private test fixtures
        uses: actions/checkout@v4
        with:
          repository: sm-merlot/stitches-test-fixtures
          token: ${{ secrets.FIXTURES_TOKEN }}
          path: test-fixtures
      - name: Write placeholder secrets
        run: cp secrets.json.example secrets.json

      - uses: actions/cache@v4
        id: flutter-cache
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-${{ env.FLUTTER_VERSION }}-linux-arm64
      - name: Install Flutter
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.FLUTTER_VERSION }} https://github.com/flutter/flutter.git ${{ env.FLUTTER_HOME }}
      - name: Add Flutter to PATH
        run: echo "${{ env.FLUTTER_HOME }}/bin" >> "$GITHUB_PATH"

      - run: flutter pub get
      - name: Run unit and widget tests
        run: flutter test --reporter=expanded

  integration-tests:
    name: Integration tests (PK parser + roundtrip)
    runs-on: homelab
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Checkout private test fixtures
        uses: actions/checkout@v4
        with:
          repository: sm-merlot/stitches-test-fixtures
          token: ${{ secrets.FIXTURES_TOKEN }}
          path: test-fixtures
      - name: Write placeholder secrets
        run: cp secrets.json.example secrets.json

      - uses: actions/cache@v4
        id: flutter-cache
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-${{ env.FLUTTER_VERSION }}-linux-arm64
      - name: Install Flutter
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.FLUTTER_VERSION }} https://github.com/flutter/flutter.git ${{ env.FLUTTER_HOME }}
      - name: Add Flutter to PATH
        run: echo "${{ env.FLUTTER_HOME }}/bin" >> "$GITHUB_PATH"

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            xvfb
      - run: flutter pub get
      - name: Enable Linux desktop and scaffold platform
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux .
      - name: PK parser — real-world PDFs
        run: xvfb-run flutter test integration_test/pk_real_pdf_parse_test.dart -d linux --no-pub --reporter=expanded
      - name: PK PDF roundtrip
        run: xvfb-run flutter test integration_test/pk_roundtrip_test.dart -d linux --no-pub --reporter=expanded
