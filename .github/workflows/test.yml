name: Tests

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  unit-tests:
    name: Unit and widget tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write placeholder secrets
        run: cp secrets.json.example secrets.json
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Run unit and widget tests
        run: flutter test --reporter=expanded
      # Integration tests require a real device.
      # Run manually as part of the v1 release checklist:
      #   flutter test integration_test/ -d macos
