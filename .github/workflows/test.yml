name: Tests

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit and widget tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write placeholder secrets
        run: cp secrets.json.example secrets.json
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Run unit and widget tests
        run: flutter test --reporter=expanded

  integration-pk-roundtrip:
    name: PK PDF roundtrip integration test
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Write placeholder secrets
        run: cp secrets.json.example secrets.json
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop
      - name: Run PK PDF roundtrip integration test
        run: flutter test integration_test/pk_roundtrip_test.dart -d macos --no-pub --reporter=expanded
