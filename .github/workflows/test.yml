name: Tests

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  statuses: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Resolve PR head SHA once — shared by both test jobs for status reporting.
  pr-context:
    name: Resolve PR context
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '/ci') && github.event.comment.user.login == 'scme0'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Get PR head SHA
        id: sha
        run: |
          SHA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '.head.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  unit-tests:
    name: Unit and widget tests
    needs: [pr-context]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.pr-context.result == 'success')
    runs-on: homelab
    container: scottyjoe9/stitches-ci:latest
    steps:
      - name: Set status pending
        if: needs.pr-context.outputs.sha != ''
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.pr-context.outputs.sha }} \
            -f state=pending -f context="Unit tests" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - name: Checkout private test fixtures
        uses: actions/checkout@v4
        with:
          repository: sm-merlot/stitches-test-fixtures
          token: ${{ secrets.FIXTURES_TOKEN }}
          path: test-fixtures
      - name: Write placeholder secrets
        run: cp secrets.json.example secrets.json
      - run: flutter pub get
      - name: Run unit and widget tests
        run: flutter test --reporter=expanded

      - name: Set status success
        if: success() && needs.pr-context.outputs.sha != ''
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.pr-context.outputs.sha }} \
            -f state=success -f context="Unit tests" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set status failure
        if: failure() && needs.pr-context.outputs.sha != ''
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.pr-context.outputs.sha }} \
            -f state=failure -f context="Unit tests" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        env:
          GH_TOKEN: ${{ github.token }}

  integration-tests:
    name: Integration tests (PK parser + roundtrip)
    needs: [pr-context]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.pr-context.result == 'success')
    runs-on: homelab
    container: scottyjoe9/stitches-ci:latest
    timeout-minutes: 10
    steps:
      - name: Set status pending
        if: needs.pr-context.outputs.sha != ''
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.pr-context.outputs.sha }} \
            -f state=pending -f context="Integration tests" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - name: Checkout private test fixtures
        uses: actions/checkout@v4
        with:
          repository: sm-merlot/stitches-test-fixtures
          token: ${{ secrets.FIXTURES_TOKEN }}
          path: test-fixtures
      - name: Write placeholder secrets
        run: cp secrets.json.example secrets.json
      - run: flutter pub get
      - name: Scaffold Linux platform
        run: flutter create --platforms=linux .
      - name: PK parser — real-world PDFs
        run: xvfb-run flutter test integration_test/pk_real_pdf_parse_test.dart -d linux --no-pub --reporter=expanded
      - name: PK PDF roundtrip
        run: xvfb-run flutter test integration_test/pk_roundtrip_test.dart -d linux --no-pub --reporter=expanded

      - name: Set status success
        if: success() && needs.pr-context.outputs.sha != ''
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.pr-context.outputs.sha }} \
            -f state=success -f context="Integration tests" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set status failure
        if: failure() && needs.pr-context.outputs.sha != ''
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.pr-context.outputs.sha }} \
            -f state=failure -f context="Integration tests" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        env:
          GH_TOKEN: ${{ github.token }}
