name: Build & Publish Release

# Triggered when release.yml pushes a version tag (e.g. v1.2.3).
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  # ── macOS (Apple Silicon) ──────────────────────────────────────────────────
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write Google credentials
        env:
          GOOGLE_SECRETS_JSON: ${{ secrets.GOOGLE_SECRETS_JSON }}
        run: printf '%s' "$GOOGLE_SECRETS_JSON" > secrets.json

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Disable code signing for CI
        run: |
          sed -i '' \
            -e 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' \
            -e 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "-";/g' \
            -e '/DEVELOPMENT_TEAM = S5X6FCGJT8;/d' \
            macos/Runner.xcodeproj/project.pbxproj

      - run: flutter build macos --release --dart-define-from-file=secrets.json

      - name: Zip app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r stitchx-macos-arm64.zip stitchx.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/macos/Build/Products/Release/stitchx-macos-arm64.zip

  # ── Android APK ───────────────────────────────────────────────────────────
  # Note: this builds with the Flutter debug signing key.
  # For Play Store distribution, add a keystore via secrets and pass
  # --dart-define or a key.properties file.
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write Google credentials
        env:
          GOOGLE_SECRETS_JSON: ${{ secrets.GOOGLE_SECRETS_JSON }}
        run: printf '%s' "$GOOGLE_SECRETS_JSON" > secrets.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Write Android local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - run: flutter pub get
      - run: flutter build apk --release --dart-define-from-file=secrets.json

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/stitchx-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/stitchx-android.apk

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write Google credentials
        env:
          GOOGLE_SECRETS_JSON: ${{ secrets.GOOGLE_SECRETS_JSON }}
        shell: pwsh
        run: $env:GOOGLE_SECRETS_JSON | Set-Content -Path secrets.json -NoNewline

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release --dart-define-from-file=secrets.json

      - name: Zip build output
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath stitchx-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: stitchx-windows-x64.zip

  # ── GitHub Release ────────────────────────────────────────────────────────
  publish:
    needs: [build-macos-arm64, build-android, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the section for this version out of CHANGELOG.md.
          # Assumes Keep a Changelog format produced by changesets.
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          # Mark as pre-release until v1.0.0.
          prerelease: ${{ !startsWith(github.ref_name, 'v1.') }}
          files: |
            artifacts/macos-arm64/stitchx-macos-arm64.zip
            artifacts/android/stitchx-android.apk
            artifacts/windows/stitchx-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
