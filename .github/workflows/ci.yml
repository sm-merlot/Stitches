name: Analyze

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: "3.44.0"
  FLUTTER_HOME: /home/runner/flutter

jobs:
  analyze:
    runs-on: homelab

    steps:
      - uses: actions/checkout@v4

      - name: Check debug markers
        run: bash scripts/check-debug-markers.sh

      - uses: actions/cache@v4
        id: flutter-cache
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: flutter-${{ env.FLUTTER_VERSION }}-linux-arm64

      - name: Install Flutter
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.FLUTTER_VERSION }} https://github.com/flutter/flutter.git ${{ env.FLUTTER_HOME }}

      - name: Add Flutter to PATH
        run: echo "${{ env.FLUTTER_HOME }}/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-warnings
