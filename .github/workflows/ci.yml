name: Analyze

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: homelab

    steps:
      - uses: actions/checkout@v4

      - name: Check debug markers
        run: bash scripts/check-debug-markers.sh

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-warnings
