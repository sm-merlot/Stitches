name: CI

on:
  pull_request:
    branches: [main]

# Skip on the version-bump PR that changesets creates.
# Its head branch is always "changeset-release/main".
jobs:
  analyze-and-test:
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test
