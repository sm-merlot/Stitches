name: stitches
description: A cross-stitch pattern editor with DMC/Anchor thread support, multiple stitch types, and local file management.
publish_to: 'none'
version: 0.10.0+15

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  yaml: ^3.1.2
  file_picker: ^11.0.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8
  pdf: ^3.12.0
  image: ^4.8.0
  args: ^2.5.0
  wakelock_plus: ^1.5.2
  googleapis: ^16.0.0
  googleapis_auth: ^2.3.0
  url_launcher: ^6.3.1
  http: ^1.2.0
  font_awesome_flutter: ^11.0.0
  pdfrx: ^2.2.24
  xml: ^6.6.1
  google_sign_in: ^7.2.0
  share_plus: ^12.0.2
  markdown: ^7.2.2
  package_info_plus: ^9.0.1
  integration_test:
    sdk: flutter
  desktop_drop: ^0.7.1

dev_dependencies:
  path: ^1.9.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/stitches_icon.png
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
    - assets/fonts/NotoSans-Italic.ttf
    - assets/fonts/NotoSansSymbols2-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icon/stitches_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/stitches_icon.png"
  image_path: "assets/icon/stitches_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/stitches_icon.png"
