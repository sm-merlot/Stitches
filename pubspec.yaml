name: stitchx
description: A cross-stitch pattern editor with DMC/Anchor thread support, multiple stitch types, and local file management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  yaml: ^3.1.2
  file_picker: ^8.0.7
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8
  pdf: ^3.11.1
  image: ^4.2.0
  args: ^2.5.0
  wakelock_plus: ^1.3.0
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  http: ^1.2.0
  pdfrx: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icon/stitchx_icon.png"
  image_path: "assets/icon/stitchx_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/stitchx_icon.png"
